<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Telemetre Bergman</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#128207;</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app" data-state="init">
    <header class="topbar">
      <div class="brand">Telemetre <span>Bergman</span></div>
      <div class="status">
        <span id="conn-dot" class="dot"></span>
        <span id="conn-text" class="conn-text">connecting…</span>
      </div>
    </header>

    <section class="readout">
      <div id="banner" class="banner hidden">NO SIGNAL</div>

      <div class="position">
        <div id="position" class="position-value">—.—</div>
        <div class="unit">m</div>
      </div>

      <div class="secondary">
        <div class="chip"><label>raw</label><span id="raw">—.—</span> m</div>
        <div class="chip"><label>zero</label><span id="zero">0.00</span> m</div>
        <div class="chip"><label>dir</label><span id="dir">→</span></div>
      </div>

      <div class="signal">
        <div class="signal-bar"><div id="signal-fill" class="signal-fill"></div></div>
        <div class="signal-meta"><span id="signal-val">0</span> · <span id="temp">—°C</span></div>
      </div>
    </section>

    <section class="controls">
      <button id="btn-zero" class="btn btn-primary">Set&nbsp;Zero</button>
      <div class="row">
        <button id="btn-clear" class="btn btn-ghost">Clear&nbsp;Zero</button>
        <button id="btn-invert" class="btn btn-ghost">Invert&nbsp;Direction</button>
      </div>
    </section>

    <footer class="powerbar">
      <button id="btn-reboot" class="btn btn-warn">Reboot</button>
      <button id="btn-off" class="btn btn-danger">Power&nbsp;Off</button>
    </footer>
  </main>

  <div id="overlay" class="overlay hidden"><div class="overlay-msg" id="overlay-msg"></div></div>

  <script src="/app.js"></script>
</body>
</html>
