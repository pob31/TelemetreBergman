# Cadreur — machine/network settings (PRD §13).
# Copy to cadreur.toml (gitignored) and adjust for this Mac. Every key has a
# code default, so a missing file or missing key never blocks startup.
# Path override: CADREUR_CONFIG env var.

[telemetre]
url = "http://192.168.0.51"     # cadreur appends /stream
stale_after_ms = 1500           # Mac-side staleness without any SSE event

[millumin]
host = "127.0.0.1"
port = 5000                     # Millumin OSC input
# Feedback/readback only works with the standard /layer:NAME API. With custom
# Interaction addresses (the default), leave feedback off: no listener is bound
# and the armed probe is disabled. Turn on only if you switch to the /layer API.
feedback = false
feedback_port = 8001            # (8000 is often taken); must match Millumin's feedback dest
feedback_timeout_ms = 1500

[web]
host = "127.0.0.1"              # set 0.0.0.0 to allow a tablet control surface
port = 8080

[shows]
dir = "shows"                   # repo-relative
autosave = true
autosave_debounce_s = 5
