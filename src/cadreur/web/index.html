<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Cadreur Bergman</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#127916;</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">CADREUR <span>Bergman</span></div>
      <div class="statuses">
        <div class="status"><span id="pi-dot" class="dot"></span>
          <span class="status-label">Pi</span> <span id="pi-text">…</span></div>
        <div class="status"><span id="mil-dot" class="dot"></span>
          <span class="status-label">Millumin</span> <span id="mil-text">—</span>
          <button id="btn-test" class="btn btn-mini" data-i18n="test_millumin" data-help="help_test">Test</button></div>
      </div>
      <button id="btn-arm" class="btn arm off" data-help="help_arm"><span data-i18n="arm_off">OFF</span></button>
    </header>

    <div id="banner" class="banner hidden"></div>

    <section class="distance card">
      <div class="dist-row">
        <div class="dist-main">
          <label data-i18n="abs_distance" data-help="help_abs">ABS DISTANCE</label>
          <div><span id="abs-m" class="dist-value">—.———</span><span class="unit">m</span></div>
        </div>
        <div class="dist-side">
          <label data-i18n="stage_pos" data-help="help_stage">stage position (crew ref)</label>
          <div><span id="stage-m" class="dist-side-value">—.———</span><span class="unit">m</span></div>
        </div>
      </div>
      <div class="travel">
        <div class="travel-ticks front" id="ticks-front"></div>
        <div class="travel-bar"><div id="cart" class="cart hidden"></div></div>
        <div class="travel-ticks rear" id="ticks-rear"></div>
        <div class="travel-range"><span id="range-min">—</span><span id="range-max">—</span></div>
      </div>
    </section>

    <section class="lookbar card">
      <label data-i18n="look" data-help="help_look">LOOK</label>
      <select id="look-select"></select>
      <div class="lookbtns">
        <button id="look-new" class="btn btn-mini" data-i18n="look_new">+ new</button>
        <button id="look-dup" class="btn btn-mini" data-i18n="look_dup">duplicate</button>
        <button id="look-ren" class="btn btn-mini" data-i18n="look_ren">rename</button>
        <button id="look-del" class="btn btn-mini danger" data-i18n="look_del">delete</button>
      </div>
    </section>

    <section class="panels">
      <!-- The two beamer panels share markup; app.js drives them by data-beamer. -->
      <div class="panel card" data-beamer="front">
        <div class="panel-head">
          <span class="panel-title" data-help="help_front">FRONT</span>
          <span class="layer-wrap"><span data-i18n="layer">layer:</span>
            <button class="layer-name btn-link">—</button></span>
          <label class="enable"><input type="checkbox" class="enable-box" />
            <span data-i18n="enable">enable</span></label>
        </div>
        <div class="chips" hidden></div>
        <div class="beamer-status"><span class="status-dot dot"></span><span class="status-text">—</span></div>
        <div class="live"><span data-i18n="live">live:</span>
          <span class="live-values">—</span></div>
        <div class="calflag hidden" data-i18n="calibrating_flag">CALIBRATING — output suspended</div>
        <button class="btn cal-toggle" data-i18n="calibrate_mode">Calibrate mode</button>
        <button class="btn btn-primary capture" data-i18n="capture">⊕ Capture point</button>
        <table class="points">
          <thead><tr>
            <th data-help="help_points">d (m)</th><th data-i18n="th_scale">scale</th><th>x</th><th>y</th><th></th>
          </tr></thead>
          <tbody></tbody>
        </table>
        <button class="btn btn-mini add-manual" data-i18n="add_manual">+ manual point</button>
        <div class="trim">
          <span data-i18n="trim" data-help="help_trim">trim</span>
          <span class="trim-group">scale <button class="btn-nudge" data-trim="scale_mul" data-step="-0.01">−−</button><button class="btn-nudge" data-trim="scale_mul" data-step="-0.001">−</button><span class="trim-val trim-scale">×1.000</span><button class="btn-nudge" data-trim="scale_mul" data-step="0.001">+</button><button class="btn-nudge" data-trim="scale_mul" data-step="0.01">++</button></span>
          <span class="trim-group">x <button class="btn-nudge" data-trim="dx_px" data-step="-10">−−</button><button class="btn-nudge" data-trim="dx_px" data-step="-1">−</button><span class="trim-val trim-x">+0</span><button class="btn-nudge" data-trim="dx_px" data-step="1">+</button><button class="btn-nudge" data-trim="dx_px" data-step="10">++</button></span>
          <span class="trim-group">y <button class="btn-nudge" data-trim="dy_px" data-step="-10">−−</button><button class="btn-nudge" data-trim="dy_px" data-step="-1">−</button><span class="trim-val trim-y">+0</span><button class="btn-nudge" data-trim="dy_px" data-step="1">+</button><button class="btn-nudge" data-trim="dy_px" data-step="10">++</button></span>
          <button class="btn btn-mini trim-bake" data-i18n="bake">bake</button>
          <button class="btn btn-mini trim-reset" data-i18n="reset">reset</button>
        </div>
      </div>
      <div class="panel card" data-beamer="rear">
        <div class="panel-head">
          <span class="panel-title" data-help="help_rear">REAR</span>
          <span class="layer-wrap"><span data-i18n="layer">layer:</span>
            <button class="layer-name btn-link">—</button></span>
          <label class="enable"><input type="checkbox" class="enable-box" />
            <span data-i18n="enable">enable</span></label>
        </div>
        <div class="chips" hidden></div>
        <div class="beamer-status"><span class="status-dot dot"></span><span class="status-text">—</span></div>
        <div class="live"><span data-i18n="live">live:</span>
          <span class="live-values">—</span></div>
        <div class="calflag hidden" data-i18n="calibrating_flag">CALIBRATING — output suspended</div>
        <button class="btn cal-toggle" data-i18n="calibrate_mode">Calibrate mode</button>
        <button class="btn btn-primary capture" data-i18n="capture">⊕ Capture point</button>
        <table class="points">
          <thead><tr>
            <th data-help="help_points">d (m)</th><th data-i18n="th_scale">scale</th><th>x</th><th>y</th><th></th>
          </tr></thead>
          <tbody></tbody>
        </table>
        <button class="btn btn-mini add-manual" data-i18n="add_manual">+ manual point</button>
        <div class="trim">
          <span data-i18n="trim" data-help="help_trim">trim</span>
          <span class="trim-group">scale <button class="btn-nudge" data-trim="scale_mul" data-step="-0.01">−−</button><button class="btn-nudge" data-trim="scale_mul" data-step="-0.001">−</button><span class="trim-val trim-scale">×1.000</span><button class="btn-nudge" data-trim="scale_mul" data-step="0.001">+</button><button class="btn-nudge" data-trim="scale_mul" data-step="0.01">++</button></span>
          <span class="trim-group">x <button class="btn-nudge" data-trim="dx_px" data-step="-10">−−</button><button class="btn-nudge" data-trim="dx_px" data-step="-1">−</button><span class="trim-val trim-x">+0</span><button class="btn-nudge" data-trim="dx_px" data-step="1">+</button><button class="btn-nudge" data-trim="dx_px" data-step="10">++</button></span>
          <span class="trim-group">y <button class="btn-nudge" data-trim="dy_px" data-step="-10">−−</button><button class="btn-nudge" data-trim="dy_px" data-step="-1">−</button><span class="trim-val trim-y">+0</span><button class="btn-nudge" data-trim="dy_px" data-step="1">+</button><button class="btn-nudge" data-trim="dy_px" data-step="10">++</button></span>
          <button class="btn btn-mini trim-bake" data-i18n="bake">bake</button>
          <button class="btn btn-mini trim-reset" data-i18n="reset">reset</button>
        </div>
      </div>
    </section>

    <footer class="showbar card">
      <div class="showfile" data-help="help_show">
        <span id="show-dot" class="dot"></span>
        <span id="show-name">—</span>
        <span id="show-file" class="muted"></span>
      </div>
      <div class="showbtns">
        <button id="btn-save" class="btn btn-mini" data-i18n="save">Save</button>
        <button id="btn-saveas" class="btn btn-mini" data-i18n="save_as">Save as</button>
        <button id="btn-load" class="btn btn-mini" data-i18n="load">Load</button>
        <a id="btn-export" class="btn btn-mini" href="/api/export" data-i18n="export">Export</a>
        <button id="btn-import" class="btn btn-mini" data-i18n="import">Import</button>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
      </div>
      <details class="advanced">
        <summary data-i18n="advanced">Advanced (smoothing)</summary>
        <div class="smoothing" id="smoothing"></div>
      </details>
      <div class="langs"><a href="?lang=en">EN</a> / <a href="?lang=fr">FR</a></div>
    </footer>
  </main>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="overlay hidden">
    <div class="modal">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn" data-i18n="cancel">Cancel</button>
        <button id="modal-okbtn" class="btn btn-primary" data-i18n="ok">OK</button>
      </div>
    </div>
  </div>
