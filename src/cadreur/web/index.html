<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Cadreur Bergman</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#127916;</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">CADREUR <span>Bergman</span></div>
      <div class="statuses">
        <div class="status"><span id="pi-dot" class="dot"></span>
          <span class="status-label">Pi</span> <span id="pi-text">…</span></div>
        <div class="status"><span id="mil-dot" class="dot"></span>
          <span class="status-label">Millumin</span> <span id="mil-text">—</span>
          <button id="btn-test" class="btn btn-mini" data-i18n="test_millumin" data-help="help_test">Test</button></div>
      </div>
      <button id="btn-arm" class="btn arm off" data-help="help_arm"><span data-i18n="arm_off">OFF</span></button>
    </header>

    <div id="banner" class="banner hidden"></div>

    <section class="distance card">
      <div class="dist-row">
        <div class="dist-main">
          <label data-i18n="abs_distance" data-help="help_abs">ABS DISTANCE</label>
          <div><span id="abs-m" class="dist-value">—.———</span><span class="unit">m</span></div>
        </div>
        <div class="dist-side">
          <label data-i18n="stage_pos" data-help="help_stage">stage position (crew ref)</label>
          <div><span id="stage-m" class="dist-side-value">—.———</span><span class="unit">m</span></div>
        </div>
      </div>
      <div class="travel">
        <div class="travel-ticks front" id="ticks-front"></div>
        <div class="travel-bar"><div id="cart" class="cart hidden"></div></div>
        <div class="travel-ticks rear" id="ticks-rear"></div>
        <div class="travel-range"><span id="range-min">—</span><span id="range-max">—</span></div>
      </div>
    </section>

    <section class="capture-all-bar hidden" id="capture-all-bar">
      <button id="btn-capture-all" class="btn btn-primary" data-i18n="capture_all" data-help="help_capture_all">⊕ Capturer tous les canaux en calibration</button>
    </section>

    <section class="beamers">
      <div class="beamer-col card" data-beamer="front">
        <div class="col-head">
          <span class="col-title" data-help="help_front">FACE</span>
          <div class="chips"></div>
          <span class="col-spacer"></span>
          <button class="btn btn-mini add-channel" data-i18n="add_channel">+ canal</button>
        </div>
        <div class="channels"></div>
      </div>
      <div class="beamer-col card" data-beamer="rear">
        <div class="col-head">
          <span class="col-title" data-help="help_rear">RÉTRO</span>
          <span class="col-spacer"></span>
          <button class="btn btn-mini add-channel" data-i18n="add_channel">+ canal</button>
        </div>
        <div class="channels"></div>
      </div>
    </section>

    <!-- One channel card; app.js clones it per channel and applies i18n. -->
    <template id="channel-tpl">
      <div class="channel" data-cid="">
        <div class="ch-head">
          <button class="ch-name btn-link">—</button>
          <label class="enable"><input type="checkbox" class="enable-box" /><span data-i18n="enable">actif</span></label>
          <span class="col-spacer"></span>
          <button class="btn btn-mini ch-osc" data-i18n="osc_edit">OSC…</button>
          <button class="btn btn-mini danger ch-del" aria-label="delete">🗑</button>
        </div>
        <div class="beamer-status"><span class="status-dot dot"></span><span class="status-text">—</span></div>
        <div class="live"><span data-i18n="live">envoi :</span> <span class="live-values">—</span></div>
        <div class="calflag hidden" data-i18n="calibrating_flag">CALIBRATION — pilotage direct</div>
        <div class="manual hidden">
          <label class="manual-row"><span data-i18n="m_scale">échelle</span><input type="range" class="drive-scale" min="0" max="1" step="0.001" value="0.5" /><span class="drive-scale-val">0.500</span></label>
          <label class="manual-row"><span data-i18n="m_horizontal">horizontal</span><input type="range" class="drive-hpos" min="0" max="1" step="0.001" value="0.5" /><span class="drive-hpos-val">0.500</span></label>
          <label class="manual-row"><span data-i18n="m_vertical">vertical</span><input type="range" class="drive-vpos" min="0" max="1" step="0.001" value="0.5" /><span class="drive-vpos-val">0.500</span></label>
        </div>
        <div class="ch-actions">
          <button class="btn cal-toggle" data-i18n="calibrate_mode">Mode calibration</button>
          <button class="btn btn-primary capture" data-i18n="capture">⊕ Capturer</button>
        </div>
        <table class="points"><thead><tr>
          <th data-help="help_points">d (m)</th><th data-i18n="th_scale">échelle</th><th data-i18n="th_horizontal">hor.</th><th data-i18n="th_vertical">vert.</th><th></th>
        </tr></thead><tbody></tbody></table>
        <button class="btn btn-mini add-manual" data-i18n="add_manual">+ point manuel</button>
        <div class="trim">
          <span data-i18n="trim" data-help="help_trim">trim</span>
          <span class="trim-group">×<span class="trim-val trim-scale">1.000</span> <button class="btn-nudge" data-trim="scale_mul" data-step="-0.01">−−</button><button class="btn-nudge" data-trim="scale_mul" data-step="-0.001">−</button><button class="btn-nudge" data-trim="scale_mul" data-step="0.001">+</button><button class="btn-nudge" data-trim="scale_mul" data-step="0.01">++</button></span>
          <span class="trim-group"><span data-i18n="m_horizontal">horizontal</span> <span class="trim-val trim-x">+0.000</span> <button class="btn-nudge" data-trim="dx_px" data-step="-0.01">−−</button><button class="btn-nudge" data-trim="dx_px" data-step="-0.001">−</button><button class="btn-nudge" data-trim="dx_px" data-step="0.001">+</button><button class="btn-nudge" data-trim="dx_px" data-step="0.01">++</button></span>
          <span class="trim-group"><span data-i18n="m_vertical">vertical</span> <span class="trim-val trim-y">+0.000</span> <button class="btn-nudge" data-trim="dy_px" data-step="-0.01">−−</button><button class="btn-nudge" data-trim="dy_px" data-step="-0.001">−</button><button class="btn-nudge" data-trim="dy_px" data-step="0.001">+</button><button class="btn-nudge" data-trim="dy_px" data-step="0.01">++</button></span>
          <button class="btn btn-mini trim-bake" data-i18n="bake">figer</button>
          <button class="btn btn-mini trim-reset" data-i18n="reset">raz</button>
        </div>
      </div>
    </template>

    <footer class="showbar card">
      <div class="showfile" data-help="help_show">
        <span id="show-dot" class="dot"></span>
        <span id="show-name">—</span>
        <span id="show-file" class="muted"></span>
      </div>
      <div class="showbtns">
        <button id="btn-save" class="btn btn-mini" data-i18n="save">Save</button>
        <button id="btn-saveas" class="btn btn-mini" data-i18n="save_as">Save as</button>
        <button id="btn-load" class="btn btn-mini" data-i18n="load">Load</button>
        <a id="btn-export" class="btn btn-mini" href="/api/export" data-i18n="export">Export</a>
        <button id="btn-import" class="btn btn-mini" data-i18n="import">Import</button>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
      </div>
      <details class="advanced">
        <summary data-i18n="advanced">Advanced (smoothing)</summary>
        <div class="smoothing" id="smoothing"></div>
      </details>
      <div class="langs"><a href="?lang=en">EN</a> / <a href="?lang=fr">FR</a></div>
    </footer>
  </main>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="overlay hidden">
    <div class="modal">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn" data-i18n="cancel">Cancel</button>
        <button id="modal-okbtn" class="btn btn-primary" data-i18n="ok">OK</button>
      </div>
    </div>
  </div>
